<h2>ToDo App</h2>
<input placeholder="write something..." [value]="newTodo()" (input)="newTodo.set($event.target.value)">
<button (click)="addTodo()">Add</button>
<hr>

<ul>
  @for(todo of todos();track $index){
     <li><span>{{$index +1 }}</span>
        <span (click)="toggleTodo($index)" [style.text-decoration]="todo.done? 'line-through':'none' ">{{todo.text}}</span>
        <button (click)="DeleteTodo($index)">Delete</button>
    </li>
  }
</ul>
